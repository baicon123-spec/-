<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>영어 본문 복습</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Black+Han+Sans&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --card: #fffdf7;
  --card2: #f0ead8;
  --accent: #c0392b;
  --accent2: #e67e22;
  --success: #27ae60;
  --danger: #e74c3c;
  --navy: #2c3e50;
  --text: #2c3e50;
  --muted: #95a5a6;
  --border: #d5c9b0;
  --shadow: 0 4px 20px rgba(0,0,0,0.1);
  --shadow2: 0 8px 32px rgba(0,0,0,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  background-image: 
    radial-gradient(circle at 20% 50%, rgba(192,57,43,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(230,126,34,0.04) 0%, transparent 50%);
  color: var(--text);
  font-family: 'Nanum Gothic', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── 홈 화면 ── */
.home-screen {
  width: 100%;
  max-width: 480px;
  padding: 40px 20px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  animation: fadeUp 0.5s ease;
}
.home-hero {
  text-align: center;
  padding: 32px 0 16px;
}
.home-hero .book-icon { font-size: 3.5rem; margin-bottom: 12px; }
.home-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 1.8rem;
  color: var(--accent);
  letter-spacing: 1px;
  line-height: 1.3;
}
.home-sub {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 6px;
}

.unit-section { display: flex; flex-direction: column; gap: 12px; }
.section-label {
  font-size: 0.7rem;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 700;
  padding-left: 4px;
}

.unit-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: var(--shadow);
}
.unit-header {
  background: var(--navy);
  color: white;
  padding: 12px 16px;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 0.95rem;
  letter-spacing: 1px;
}
.page-list { display: flex; flex-direction: column; }
.page-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px;
  border-bottom: 1px solid var(--card2);
  cursor: pointer;
  transition: background 0.2s;
}
.page-item:last-child { border-bottom: none; }
.page-item:active { background: var(--card2); }
.page-info { display: flex; flex-direction: column; gap: 2px; }
.page-num {
  font-weight: 800;
  font-size: 0.95rem;
  color: var(--accent);
}
.page-count { font-size: 0.75rem; color: var(--muted); }
.page-actions { display: flex; gap: 8px; }
.btn-mode {
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 800;
  border: none;
  cursor: pointer;
  font-family: 'Nanum Gothic', sans-serif;
  transition: transform 0.15s, opacity 0.2s;
}
.btn-mode:active { transform: scale(0.93); }
.btn-review {
  background: var(--navy);
  color: white;
}
.btn-quiz {
  background: var(--accent);
  color: white;
}

/* ── 공통 헤더 ── */
.app-header {
  width: 100%;
  background: var(--card);
  border-bottom: 1.5px solid var(--border);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.btn-back {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
  font-size: 0.8rem;
  font-weight: 800;
  cursor: pointer;
  color: var(--text);
  font-family: 'Nanum Gothic', sans-serif;
  white-space: nowrap;
}
.header-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 1rem;
  color: var(--navy);
  flex: 1;
}
.header-badge {
  background: var(--accent);
  color: white;
  font-size: 0.75rem;
  font-weight: 800;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

/* ── 복습 모드 ── */
.review-screen {
  display: none;
  width: 100%;
  flex-direction: column;
}
.review-screen.show { display: flex; }
.review-content {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  padding: 20px 16px 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.review-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: var(--shadow);
  animation: fadeUp 0.3s ease;
}
.review-card-en {
  padding: 14px 16px 10px;
  font-family: 'Nanum Myeongjo', serif;
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--navy);
  font-weight: 700;
  border-bottom: 1px solid var(--card2);
}
.review-card-ko {
  padding: 10px 16px 14px;
  font-size: 0.88rem;
  line-height: 1.8;
  color: #7f8c8d;
  word-break: keep-all;
}
.review-num {
  font-size: 0.65rem;
  color: var(--muted);
  margin-bottom: 4px;
  font-weight: 700;
  letter-spacing: 1px;
}

/* ── 퀴즈 모드 ── */
.quiz-screen {
  display: none;
  width: 100%;
  flex-direction: column;
}
.quiz-screen.show { display: flex; }

.progress-bar-wrap {
  width: 100%;
  height: 3px;
  background: var(--border);
}
.progress-bar {
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s ease;
}

.quiz-content {
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  padding: 20px 16px 40px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.q-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 18px;
  box-shadow: var(--shadow);
}
.q-label {
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 800;
  margin-bottom: 8px;
}
.q-sentence {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 1rem;
  line-height: 1.7;
  color: var(--navy);
  font-weight: 700;
}

.answer-label {
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--accent2);
  text-transform: uppercase;
  font-weight: 800;
  margin-bottom: 8px;
}
.answer-zone {
  min-height: 64px;
  background: var(--card);
  border: 2px dashed var(--border);
  border-radius: 14px;
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-content: flex-start;
  transition: border-color 0.3s, background 0.3s;
}
.answer-zone.correct-zone {
  border-color: var(--success);
  background: rgba(39,174,96,0.05);
  border-style: solid;
}
.answer-zone.wrong-zone {
  border-color: var(--danger);
  background: rgba(231,76,60,0.05);
  border-style: solid;
}
.answer-placeholder {
  color: var(--muted);
  font-size: 0.82rem;
  width: 100%;
  text-align: center;
  padding: 10px 0;
}

.block {
  background: var(--navy);
  color: white;
  border-radius: 10px;
  padding: 8px 13px;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  user-select: none;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 2px 6px rgba(44,62,80,0.2);
  white-space: nowrap;
}
.block:active { transform: scale(0.93); }
.block.in-answer {
  background: #34495e;
}
.block.selected-block {
  background: var(--accent2);
  box-shadow: 0 0 0 3px rgba(230,126,34,0.5);
  transform: scale(1.06);
}
.block.correct-block {
  background: var(--success);
  animation: popIn 0.3s ease;
}
.block.wrong-block {
  background: var(--danger);
  animation: shake 0.4s ease;
}

.pool-label {
  font-size: 0.65rem;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  font-weight: 800;
  margin-bottom: 8px;
}
.block-pool {
  min-height: 56px;
  background: var(--card2);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-content: flex-start;
}

.result-msg {
  text-align: center;
  font-size: 0.92rem;
  font-weight: 800;
  padding: 12px 16px;
  border-radius: 12px;
  display: none;
  animation: fadeUp 0.3s ease;
  line-height: 1.5;
}
.result-msg.correct {
  background: rgba(39,174,96,0.1);
  color: var(--success);
  border: 1.5px solid var(--success);
  display: block;
}
.result-msg.wrong {
  background: rgba(231,76,60,0.1);
  color: var(--danger);
  border: 1.5px solid var(--danger);
  display: block;
}

.btn-row { display: flex; gap: 10px; }
.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-family: 'Nanum Gothic', sans-serif;
  font-size: 0.92rem;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.15s;
}
.btn:active { transform: scale(0.96); }
.btn-check { background: var(--accent); color: white; }
.btn-reset { background: var(--card2); color: var(--muted); border: 1.5px solid var(--border); flex: 0.45; }
.btn-next { background: var(--success); color: white; display: none; }

/* ── 최종 화면 ── */
.final-screen {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 50px 24px;
  text-align: center;
  max-width: 480px;
  width: 100%;
  margin: 0 auto;
  animation: fadeUp 0.5s ease;
}
.final-screen.show { display: flex; }
.final-emoji { font-size: 4rem; }
.final-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 2rem;
  color: var(--accent);
}
.final-detail { color: var(--muted); font-size: 1rem; line-height: 1.8; }
.final-detail strong { color: var(--text); font-size: 1.3rem; }
.btn-home {
  background: var(--navy);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 16px 40px;
  font-family: 'Nanum Gothic', sans-serif;
  font-size: 1rem;
  font-weight: 800;
  cursor: pointer;
  margin-top: 8px;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes popIn {
  0%  { transform: scale(0.8); }
  60% { transform: scale(1.12); }
  100%{ transform: scale(1); }
}
@keyframes shake {
  0%,100%{ transform: translateX(0); }
  20%    { transform: translateX(-5px); }
  40%    { transform: translateX(5px); }
  60%    { transform: translateX(-3px); }
  80%    { transform: translateX(3px); }
}
</style>
</head>
<body>

<!-- ══ 홈 화면 ══ -->
<div id="homeScreen" class="home-screen">
  <div class="home-hero">
    <div class="book-icon">📚</div>
    <div class="home-title">영어 본문<br>복습 게임</div>
    <div class="home-sub">Joy of Missing Out · 1단원</div>
  </div>
  <div class="unit-section">
    <div class="section-label">📖 페이지 선택</div>
    <div class="unit-card">
      <div class="unit-header">1단원 — Joy of Missing Out</div>
      <div class="page-list" id="pageList"></div>
    </div>
  </div>
</div>

<!-- ══ 복습 화면 ══ -->
<div id="reviewScreen" class="review-screen">
  <div class="app-header">
    <button class="btn-back" id="btnBackReview">← 홈</button>
    <div class="header-title" id="reviewTitle"></div>
    <div class="header-badge" id="reviewBadge"></div>
  </div>
  <div class="review-content" id="reviewContent"></div>
</div>

<!-- ══ 퀴즈 화면 ══ -->
<div id="quizScreen" class="quiz-screen">
  <div class="app-header">
    <button class="btn-back" id="btnBackQuiz">← 홈</button>
    <div class="header-title" id="quizTitle"></div>
    <div class="header-badge">✅ <span id="scoreVal">0</span> / <span id="totalVal">0</span></div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div class="quiz-content">
    <div class="q-card">
      <div class="q-label">📖 영어 문장</div>
      <div class="q-sentence" id="qSentence"></div>
    </div>
    <div>
      <div class="answer-label">✏️ 순서대로 배열하세요</div>
      <div class="answer-zone" id="answerZone">
        <div class="answer-placeholder" id="answerPH">블록을 터치해서 순서대로 올려놓으세요</div>
      </div>
    </div>
    <div>
      <div class="pool-label">🔤 한국어 블록</div>
      <div class="block-pool" id="blockPool"></div>
    </div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="btn-row">
      <button class="btn btn-reset" id="btnReset">↩ 초기화</button>
      <button class="btn btn-check" id="btnCheck">정답 확인</button>
      <button class="btn btn-next" id="btnNext">다음 ▶</button>
    </div>
  </div>
  <div class="final-screen" id="finalScreen">
    <div class="final-emoji" id="finalEmoji">🎉</div>
    <div class="final-title">완료!</div>
    <div class="final-detail" id="finalDetail"></div>
    <button class="btn-home" id="btnHome">🏠 홈으로</button>
  </div>
</div>

<script>
// ══ 데이터 ══
const DATA = {
  1: {
    pages: {
      13: [
        { en: '"Selena. SELENA!"', ko: '"셀레나. 셀레나!"', blocks: ['"셀레나.', '셀레나!"'] },
        { en: '"Yes," I look up from my phone to discover my mom yelling at me.', ko: '"네," 나는 눈을 든다 / 내 폰에서 / 발견하며 / 엄마가 나에게 소리치고 있다는 것을', blocks: ['"네,"', '나는 폰에서 눈을 들었다', '엄마가 나에게', '소리치고 있다는 것을', '알아채며'] },
        { en: 'She seems to be searching for an answer to something.', ko: '그녀는 찾고 있는 것 같다 / 답을 / 무언가에 대한', blocks: ['그녀는', '무언가에 대한 답을', '찾고 있는 것 같았다'] },
        { en: '"What?" I asked.', ko: '"뭐라고요?" 나는 물었다', blocks: ['"뭐라고요?"', '나는 물었다'] },
        { en: 'She asked, "Did you not hear what I just said?"', ko: '그녀가 물었다, "듣지 못했니 / 내가 방금 한 말을?"', blocks: ['그녀는 물었다', '"내가 방금 한 말', '못 들었니?"'] },
        { en: "No, I didn't. I didn't hear anything she said.", ko: '아니, 못 들었다. / 나는 듣지 못했다 / 아무것도 / 그녀가 말한', blocks: ['아니, 못 들었다', '나는 그녀가 한 말을', '전혀 듣지 못했다'] },
        { en: "I usually don't hear a single word said to me by anyone. And why is that?", ko: '나는 보통 듣지 못한다 / 한 마디도 / 누구에게서도 나에게 하는. / 그런데 왜 그럴까?', blocks: ['나는 보통', '누구도 나에게 하는 말을', '한 마디도 듣지 못한다', '그런데 왜 그럴까?'] },
        { en: "It's because my eyes are fixed on my phone.", ko: '그것은 때문이다 / 내 눈이 고정되어 있기 / 내 폰에', blocks: ['그것은', '내 눈이 폰에', '고정되어 있기 때문이다'] },
        { en: 'My mom always asks me, "What is so interesting on your phone?"', ko: '엄마는 항상 내게 묻는다, / "뭐가 그렇게 재미있니 / 네 폰에?"', blocks: ['엄마는 항상 나에게 묻는다', '"폰에 뭐가', '그렇게 재미있니?"'] },
        { en: "I never know how to answer that because even I don't know what's so interesting on my phone.", ko: '나는 모른다 / 어떻게 답해야 할지 / 왜냐하면 나조차 모르기 때문에 / 뭐가 그렇게 재미있는지 / 내 폰에', blocks: ['나는 그 질문에', '어떻게 답해야 할지 모른다', '나조차도', '폰에 뭐가 그렇게 재미있는지', '모르기 때문이다'] },
      ],
      14: [
        { en: "I have a bad case of anxiety that comes from not checking my phone.", ko: '나는 가지고 있다 / 심한 불안감을 / 오는 / 폰을 확인하지 못하는 것에서', blocks: ['나는', '심한 불안감을', '가지고 있다', '폰을 확인하지 못할 때 오는'] },
        { en: "I spend most of my day on social media.", ko: '나는 보낸다 / 하루 대부분을 / 소셜 미디어에서', blocks: ['나는', '하루 대부분을', '소셜 미디어에서 보낸다'] },
        { en: "I fear missing out on social media.", ko: '나는 두려워한다 / 놓치는 것을 / 소셜 미디어에서', blocks: ['나는', '소셜 미디어에서', '놓치는 것을 두려워한다'] },
        { en: "I fear not being in the know of what everyone is discussing.", ko: '나는 두려워한다 / 모르게 되는 것을 / 모두가 토론하는 것을', blocks: ['나는', '모두가 토론하는 것을', '모르게 되는 것을', '두려워한다'] },
        { en: "I fear not being in the know of what my friends are posting on social media.", ko: '나는 두려워한다 / 모르게 되는 것을 / 친구들이 올리는 것을 / 소셜 미디어에', blocks: ['나는', '친구들이 소셜 미디어에', '올리는 것을', '모르게 되는 것을', '두려워한다'] },
        { en: "My mom thinks I'm addicted to my phone.", ko: '엄마는 생각한다 / 내가 중독되었다고 / 내 폰에', blocks: ['엄마는', '내가 폰에', '중독되었다고 생각한다'] },
        { en: "Older people think teenagers like me have an addiction to their phones and computers.", ko: '어른들은 생각한다 / 나 같은 십대들이 중독되어 있다고 / 폰과 컴퓨터에', blocks: ['어른들은', '나 같은 십대들이', '폰과 컴퓨터에', '중독되어 있다고 생각한다'] },
        { en: "But I wouldn't say it's an addiction to a device.", ko: '하지만 나는 말하지 않겠다 / 그것이 중독이라고 / 기기에 대한', blocks: ['하지만 나는', '그것이 기기에 대한', '중독이라고', '말하지 않겠다'] },
        { en: "It's an addiction to social media.", ko: '그것은 중독이다 / 소셜 미디어에 대한', blocks: ['그것은', '소셜 미디어에 대한', '중독이다'] },
        { en: "It's an addiction to being online, or in other words, a fear of not being online.", ko: '그것은 중독이다 / 온라인 상태에 대한, / 다시 말해 / 두려움이다 / 오프라인 상태에 대한', blocks: ['그것은', '온라인 상태에 대한 중독', '다시 말해', '오프라인 상태에 대한', '두려움이다'] },
        { en: "Basically, I have severe FOMO, for which I'm in desperate need of a cure.", ko: '기본적으로, / 나는 가지고 있다 / 심각한 FOMO를, / 그에 대해 / 나는 절실히 필요하다 / 치료가', blocks: ['기본적으로', '나는 심각한 FOMO를', '가지고 있고', '그에 대한 치료가', '절실히 필요하다'] },
        { en: "Maybe this spring break could be a chance to find one.", ko: '아마도 / 이번 봄 방학이 될 수 있을 것이다 / 기회가 / 그것을 찾을', blocks: ['아마도', '이번 봄 방학이', '그것을 찾을', '기회가 될 수 있을 것이다'] },
      ]
    }
  }
};

// ══ 상태 ══
let currentUnit = 1, currentPage = 13;
let quizQuestions = [], quizIdx = 0, score = 0;
let answerBlocks = [], poolBlocks = [], checked = false;

// ══ 홈 화면 렌더 ══
function renderHome() {
  const pl = document.getElementById('pageList');
  pl.innerHTML = '';
  const unit = DATA[1];
  Object.keys(unit.pages).forEach(pg => {
    const count = unit.pages[pg].length;
    const item = document.createElement('div');
    item.className = 'page-item';
    item.innerHTML = `
      <div class="page-info">
        <div class="page-num">p. ${pg}</div>
        <div class="page-count">문장 ${count}개</div>
      </div>
      <div class="page-actions">
        <button class="btn-mode btn-quiz" data-unit="1" data-page="${pg}" data-mode="quiz">🎮 퀴즈</button>
        <button class="btn-mode btn-review" data-unit="1" data-page="${pg}" data-mode="review">📖 복습</button>
      </div>`;
    pl.appendChild(item);
  });

  // 페이지 버튼 이벤트 위임
  pl.addEventListener('click', function(e) {
    const btn = e.target.closest('.btn-mode');
    if (!btn) return;
    const unit = parseInt(btn.dataset.unit);
    const page = parseInt(btn.dataset.page);
    const mode = btn.dataset.mode;
    if (mode === 'quiz') startQuiz(unit, page);
    else startReview(unit, page);
  });
}

function goHome() {
  document.getElementById('homeScreen').style.display = 'flex';
  document.getElementById('reviewScreen').classList.remove('show');
  document.getElementById('quizScreen').classList.remove('show');
  document.getElementById('finalScreen').classList.remove('show');
  document.querySelector('.quiz-content').style.display = 'flex';
}

// ══ 복습 모드 ══
function startReview(unit, page) {
  currentUnit = unit; currentPage = page;
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('reviewTitle').textContent = `1단원 · p.${page} 복습`;
  document.getElementById('reviewBadge').textContent = `${DATA[unit].pages[page].length}문장`;

  const content = document.getElementById('reviewContent');
  content.innerHTML = '';
  DATA[unit].pages[page].forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'review-card';
    card.style.animationDelay = `${i * 0.05}s`;
    card.innerHTML = `
      <div class="review-card-en">
        <div class="review-num">${i+1}</div>
        ${q.en}
      </div>
      <div class="review-card-ko">${q.ko.replace(/\//g, '<span style="color:var(--accent2);font-weight:800;padding:0 2px;">/</span>')}</div>`;
    content.appendChild(card);
  });
  document.getElementById('reviewScreen').classList.add('show');
}

// ══ 퀴즈 모드 ══
let correctSet = new Set(); // 이미 맞힌 문제 인덱스 저장

function startQuiz(unit, page) {
  currentUnit = unit; currentPage = page;
  quizQuestions = shuffle([...DATA[unit].pages[page]]);
  quizIdx = 0; score = 0;
  correctSet = new Set();
  document.getElementById('scoreVal').textContent = 0;
  document.getElementById('totalVal').textContent = quizQuestions.length;
  document.getElementById('quizTitle').textContent = `1단원 · p.${page} 퀴즈`;
  document.getElementById('homeScreen').style.display = 'none';
  document.getElementById('quizScreen').classList.add('show');
  document.getElementById('finalScreen').classList.remove('show');
  document.querySelector('.quiz-content').style.display = 'flex';
  loadQuizQuestion();
}

function loadQuizQuestion() {
  checked = false;
  selectedAnswerIdx = -1;
  answerBlocks = [];
  const q = quizQuestions[quizIdx];
  poolBlocks = shuffle([...q.blocks]);

  document.getElementById('qSentence').textContent = q.en;
  document.getElementById('progressBar').style.width = `${((quizIdx+1)/quizQuestions.length)*100}%`;
  document.getElementById('resultMsg').className = 'result-msg';
  document.getElementById('answerZone').className = 'answer-zone';
  document.getElementById('btnCheck').style.display = 'flex';
  document.getElementById('btnNext').style.display = 'none';
  renderPool(); renderAnswer();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function renderPool() {
  const pool = document.getElementById('blockPool');
  pool.innerHTML = '';
  poolBlocks.forEach((text, i) => {
    const b = document.createElement('div');
    b.className = 'block';
    b.textContent = text;
    b.onclick = () => moveToAnswer(i);
    pool.appendChild(b);
  });
}

let selectedAnswerIdx = -1;

function renderAnswer() {
  const zone = document.getElementById('answerZone');
  zone.innerHTML = '';
  if (!answerBlocks.length) {
    const p = document.createElement('div');
    p.className = 'answer-placeholder';
    p.textContent = '블록을 터치해서 순서대로 올려놓으세요';
    zone.appendChild(p);
    selectedAnswerIdx = -1;
    return;
  }
  answerBlocks.forEach((text, idx) => {
    const b = document.createElement('div');
    const isSelected = (idx === selectedAnswerIdx);
    b.className = 'block in-answer' + (isSelected ? ' selected-block' : '');
    b.textContent = text;
    if (!checked) {
      b.onclick = () => tapAnswerBlock(idx);
    }
    zone.appendChild(b);
  });
}

function tapAnswerBlock(i) {
  if (checked) return;
  if (selectedAnswerIdx === -1) {
    // 첫 번째 블록 선택
    selectedAnswerIdx = i;
    renderAnswer();
  } else if (selectedAnswerIdx === i) {
    // 같은 블록 다시 터치 → 선택 해제
    selectedAnswerIdx = -1;
    renderAnswer();
  } else {
    // 다른 블록 터치 → 위치 교환
    const tmp = answerBlocks[selectedAnswerIdx];
    answerBlocks[selectedAnswerIdx] = answerBlocks[i];
    answerBlocks[i] = tmp;
    selectedAnswerIdx = -1;
    renderAnswer();
  }
}

function moveToPool(i) {
  // 더 이상 직접 호출하지 않음 (tapAnswerBlock으로 대체)
}

function moveToAnswer(i) {
  if (checked) return;
  answerBlocks.push(poolBlocks[i]);
  poolBlocks.splice(i, 1);
  renderPool(); renderAnswer();
}

function resetAnswer() {
  checked = false;
  selectedAnswerIdx = -1;
  poolBlocks = shuffle([...quizQuestions[quizIdx].blocks]);
  answerBlocks = [];
  renderPool(); renderAnswer();
  document.getElementById('resultMsg').className = 'result-msg';
  document.getElementById('answerZone').className = 'answer-zone';
  document.getElementById('btnCheck').style.display = 'flex';
  document.getElementById('btnNext').style.display = 'none';
}

function checkAnswer() {
  const q = quizQuestions[quizIdx];
  if (!answerBlocks.length) return;
  if (answerBlocks.length < q.blocks.length) {
    document.getElementById('resultMsg').className = 'result-msg wrong';
    document.getElementById('resultMsg').textContent = '⚠️ 모든 블록을 배치해주세요!';
    return;
  }
  checked = true;
  const isCorrect = JSON.stringify(answerBlocks) === JSON.stringify(q.blocks);
  const zone = document.getElementById('answerZone');
  zone.querySelectorAll('.block').forEach((b, i) => {
    b.className = answerBlocks[i] === q.blocks[i] ? 'block correct-block' : 'block wrong-block';
  });

  const msg = document.getElementById('resultMsg');
  if (isCorrect) {
    // 이미 맞힌 문제가 아닐 때만 카운트
    if (!correctSet.has(quizIdx)) {
      correctSet.add(quizIdx);
      score = correctSet.size;
      document.getElementById('scoreVal').textContent = score;
    }
    zone.className = 'answer-zone correct-zone';
    msg.className = 'result-msg correct';
    msg.textContent = '🎉 정답입니다!';
  } else {
    zone.className = 'answer-zone wrong-zone';
    msg.className = 'result-msg wrong';
    msg.textContent = '❌ 틀렸어요!';
    setTimeout(() => {
      if (checked) msg.textContent = '💡 정답: ' + q.blocks.join(' → ');
    }, 1100);
  }
  document.getElementById('btnCheck').style.display = 'none';
  document.getElementById('btnNext').style.display = 'flex';
}

function nextQuestion() {
  quizIdx++;
  if (quizIdx >= quizQuestions.length) {
    showFinal();
  } else {
    loadQuizQuestion();
  }
}

function showFinal() {
  document.querySelector('.quiz-content').style.display = 'none';
  const fs = document.getElementById('finalScreen');
  fs.classList.add('show');
  const correct = correctSet.size;
  const total = quizQuestions.length;
  const ratio = correct / total;
  document.getElementById('finalEmoji').textContent =
    ratio >= 0.9 ? '🏆' : ratio >= 0.7 ? '🎉' : ratio >= 0.5 ? '😊' : '💪';
  document.getElementById('finalDetail').innerHTML =
    `<strong>${correct} / ${total}</strong>문제 정답<br>정답률 ${Math.round(ratio*100)}%`;
}

// ══ 초기화 ══
renderHome();

// ══ 이벤트 리스너 (Apps Script 웹앱 호환) ══
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('btnBackReview').addEventListener('click', goHome);
  document.getElementById('btnBackQuiz').addEventListener('click', goHome);
  document.getElementById('btnReset').addEventListener('click', resetAnswer);
  document.getElementById('btnCheck').addEventListener('click', checkAnswer);
  document.getElementById('btnNext').addEventListener('click', nextQuestion);
  document.getElementById('btnHome').addEventListener('click', goHome);
});
</script>
</body>
</html>
